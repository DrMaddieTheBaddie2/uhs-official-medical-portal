<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UHS Medical Portal — Unmatched Ambulance Service</title>
    <script>
      // Apply the persisted (or OS) theme before first paint to prevent a flash
      // of the wrong theme. Key and values mirror src/lib/theme.ts.
      ;(function () {
        try {
          var stored = localStorage.getItem('uhs-theme')
          var dark =
            stored === 'dark' ||
            ((stored === null || stored === 'system') && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', dark)
        } catch (_) {
          /* storage unavailable — default to light */
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
